services:
  - type: web
    name: novacart-ai-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn novacart_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://novacart-ai.netlify.app"
    autoDeploy: true
